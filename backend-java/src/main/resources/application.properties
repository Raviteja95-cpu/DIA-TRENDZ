# Spring Boot Application Properties for Diatrendz ERP
spring.application.name=dia-trendz-erp

# Active profile - local uses H2 DB, prod uses PostgreSQL
spring.profiles.active=prod

# --- DATABASE CONFIGURATIONS (PRODUCTION POSTGRESQL) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/diatrendz}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- OPTIONAL LOCAL DEVELOPMENT H2 PROFILE CONFIGURES ---
# If spring.profiles.active=local, H2 will be active
# spring.datasource.url=jdbc:h2:mem:diatrendzdb;DB_CLOSE_DELAY=-1
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# Base parameters
server.port=8080
server.servlet.context-path=/

# Set maximum upload size for files (e.g. proof images from goldsmiths)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
